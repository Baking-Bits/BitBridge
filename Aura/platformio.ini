  lvgl/lvgl @ 9.2.2

build_flags =
  -D USER_SETUP_LOADED
  -D LV_CONF_INCLUDE_SIMPLE
  -D AURA_NO_PET
  -include "${PROJECT_DIR}/TFT_eSPI/User_Setup.h"
  -include "${PROJECT_DIR}/lvgl/src/lv_conf.h"

[env:homelab_cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<homelab_manager.cpp>
  -<weather.ino>

lib_deps =
  bblanchon/ArduinoJson @ 7.4.1
  bodmer/TFT_eSPI @ 2.5.43
  adafruit/Adafruit GFX Library @ ^1.11.11
  tzapu/WiFiManager @ 2.0.17
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
  -D USER_SETUP_LOADED
  -include "${PROJECT_DIR}/TFT_eSPI/User_Setup.h"

[env:aura_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_src_filter =
  +<weather_app.cpp>
  +<icon_*.c>
  +<image_*.c>
  +<lv_font_montserrat_latin_*.c>
  +<translations.h>
  -<homelab_manager.cpp>
  -<homelab_manager.ino>
  -<pet_game.cpp>
  -<pet_storage.cpp>
  -<pet_ui.cpp>
  -<pet_poc.cpp>
  -<tic_tac_toe.cpp>
  -<extract_unicode_chars.py>

lib_deps =
  bblanchon/ArduinoJson @ 7.4.1
  bodmer/TFT_eSPI @ 2.5.43
  adafruit/Adafruit GFX Library @ ^1.11.11
  tzapu/WiFiManager @ 2.0.17
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  lvgl/lvgl @ 9.2.2

build_flags =
  -DUSE_RAW_LCD=1
  -D USER_SETUP_LOADED
  -D LV_CONF_INCLUDE_SIMPLE
  -D AURA_NO_PET
  -D AURA_ENABLE_HOMELAB=1
  -DUSE_FSPI_PORT=1
  -DILI9341_2_DRIVER=1
  -DTFT_INVERSION_ON=1
  -DTFT_MISO=13
  -DTFT_MOSI=11
  -DTFT_SCLK=12
  -DTFT_CS=10
  -DTFT_DC=46
  -DTFT_RST=-1
  -DTFT_BL=45
  -DSPI_FREQUENCY=40000000
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DS3_CAP_TOUCH=1
  -DFT6336_SDA=16
  -DFT6336_SCL=15
  -DFT6336_INT=17
  -DFT6336_RST=18
  -DFT6336_ADDR=0x38
  -DSPEAKER_PIN=4
  ; Set these to your S3 board pinout:
  ; -D BATTERY_ADC_PIN=1
  ; -D BATTERY_CHARGE_PIN=2
  ; -D BATTERY_CHARGE_ACTIVE_LEVEL=0
  ; -D MIC_ADC_PIN=3
  ; -D SPEAKER_PIN=4
    -DBATTERY_ADC_PIN=9
    -DBATTERY_DIVIDER_RATIO=2.0f
    -DBATTERY_CHARGE_PIN=-1
    -DBATTERY_CHARGE_ACTIVE_LEVEL=0
    -DMIC_ADC_PIN=-1
  ; -D XPT2046_MOSI=32
  ; -D XPT2046_MISO=39
  ; -D XPT2046_CLK=25
  ; -D XPT2046_CS=33
  ; -D XPT2046_IRQ=36
  ; -D LCD_BACKLIGHT_PIN=21
  ; -D TFT_MOSI=13
  ; -D TFT_MISO=12
  ; -D TFT_SCLK=14
  ; -D TFT_CS=15
  ; -D TFT_DC=2
  ; -D TFT_RST=-1
  -include "${PROJECT_DIR}/TFT_eSPI/User_Setup.h"
  -include "${PROJECT_DIR}/lvgl/src/lv_conf.h"

[env:homelab_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_src_filter =
  +<homelab_manager.cpp>
  -<weather.ino>

lib_deps =
  bblanchon/ArduinoJson @ 7.4.1
  bodmer/TFT_eSPI @ 2.5.43
  adafruit/Adafruit GFX Library @ ^1.11.11
  tzapu/WiFiManager @ 2.0.17
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
  -DUSE_RAW_LCD=1
  -D USER_SETUP_LOADED
  -DUSE_FSPI_PORT=1
  -DILI9341_DRIVER=1
  -DTFT_INVERSION_ON=1
  -DTFT_MISO=13
  -DTFT_MOSI=11
  -DTFT_SCLK=12
  -DTFT_CS=10
  -DTFT_DC=46
  -DTFT_RST=-1
  -DTFT_BL=45
  -DSPI_FREQUENCY=40000000
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DS3_CAP_TOUCH=1
  -DFT6336_SDA=16
  -DFT6336_SCL=15
  -DFT6336_INT=17
  -DFT6336_RST=18
  -DFT6336_ADDR=0x38
  ; Raw LCD backend uses these pins directly, but keep setup included so TFT_eSPI
  ; can still compile if pulled transitively by LDF.
  -include "${PROJECT_DIR}/TFT_eSPI/User_Setup.h"

