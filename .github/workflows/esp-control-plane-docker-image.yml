name: ESP Control Plane Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ESPControlPlane/**
      - index.html
      - app.js
      - styles.css
      - devices.config.js
      - packages/**
      - bin/**
      - .github/workflows/esp-control-plane-docker-image.yml
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ESP Control Plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ESPControlPlane/Dockerfile
          push: true
          tags: |
            ${{ secrets.ESP_CONTROL_PLANE_IMAGE_NAME }}:latest
            ${{ secrets.ESP_CONTROL_PLANE_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
