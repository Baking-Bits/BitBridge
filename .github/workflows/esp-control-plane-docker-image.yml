name: ESP Control Plane Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ESPControlPlane/**
      - index.html
      - app.js
      - styles.css
      - devices.config.js
      - packages/**
      - bin/**
      - .github/workflows/esp-control-plane-docker-image.yml
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image namespace
        id: image_meta
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push ESP Control Plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ESPControlPlane/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image_meta.outputs.owner_lc }}/esp-control-plane:latest
            ghcr.io/${{ steps.image_meta.outputs.owner_lc }}/esp-control-plane:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
