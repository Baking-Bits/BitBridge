name: HomeLab Manager Docker Image

on:
  push:
    branches:
      - main
    paths:
      - HomeLabManager/**
      - .github/workflows/homelab-manager-docker-image.yml
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HomeLabManager image
        uses: docker/build-push-action@v6
        with:
          context: ./HomeLabManager
          file: ./HomeLabManager/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-manager:latest
            ghcr.io/${{ github.repository_owner }}/homelab-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64